name: Test App Store Connection

on:
  workflow_dispatch:

jobs:
  test-connection:
    runs-on: macos-14

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'

      - name: Install Fastlane
        run: sudo gem install fastlane

      - name: Create API Key JSON
        env:
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_B64: ${{ secrets.APP_STORE_CONNECT_API_KEY_B64 }}
        run: |
          echo "$APP_STORE_CONNECT_API_KEY_B64" | base64 --decode > AuthKey.p8

          KEY_CONTENT=$(cat AuthKey.p8 | awk '{printf "%s\\n", $0}')

          cat > api_key.json <<EOF
          {
            "key_id": "$APP_STORE_CONNECT_API_KEY_KEY_ID",
            "issuer_id": "$APP_STORE_CONNECT_API_KEY_ISSUER_ID",
            "key": "$KEY_CONTENT"
          }
          EOF

      - name: Test App Store Connect Connection
        run: |
          fastlane pilot list \
            --api_key_path api_key.json \
            --app_identifier "com.yapsody.SampleApp" \
            --verbose