name: Deploy iOS App

on:
  workflow_dispatch:
    inputs:
      BUILD_NUMBER:
        description: "Optional Build Number"
        required: false

jobs:
  deploy:
    runs-on: macos-14

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"

      - name: Install Fastlane
        run: gem install fastlane

      - name: Verify Environment
        run: |
          ruby -v
          fastlane --version

      - name: Create App Store Connect API Key
        env:
          APP_STORE_CONNECT_API_KEY_B64: ${{ secrets.APP_STORE_CONNECT_API_KEY_B64 }}
        run: |
          echo "$APP_STORE_CONNECT_API_KEY_B64" | base64 --decode > AuthKey.p8

      - name: Setup Code Signing
        env:
          IOS_CERTIFICATE_P12: ${{ secrets.IOS_CERTIFICATE_P12 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          echo "$IOS_CERTIFICATE_P12" | base64 --decode > certificate.p12
          echo "$IOS_PROVISIONING_PROFILE" | base64 --decode > profile.mobileprovision

          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain

          security import certificate.p12 \
            -k build.keychain \
            -P "$IOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "" \
            build.keychain

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$(security cms -D -i profile.mobileprovision)")
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

      - name: Deploy to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_B64: ${{ secrets.APP_STORE_CONNECT_API_KEY_B64 }}

          APP_IDENTIFIER: ${{ secrets.APP_IDENTIFIER }}
          TEAM_ID: ${{ secrets.TEAM_ID }}

          XCODE_PROJECT: ${{ secrets.XCODE_PROJECT }}
          XCODE_SCHEME: ${{ secrets.XCODE_SCHEME }}

          BUILD_NUMBER: ${{ github.event.inputs.BUILD_NUMBER }}
        run: |
          fastlane beta --verbose

      - name: Cleanup
        if: always()
        run: |
          rm -f AuthKey.p8
          rm -f certificate.p12
          rm -f profile.mobileprovision
          security delete-keychain build.keychain || true