name: iOS TestFlight Deploy

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: "Override build number (leave blank to auto-increment from TestFlight)"
        required: false

# Prevents two people triggering a deploy at the same time from racing.
concurrency:
  group: ios-testflight-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GitHub-hosted macOS runners ship several Xcode versions side by side —
      # unlike a self-hosted box with one install, you have to pin this
      # explicitly or you'll silently get whatever the image's default is.
      - name: Select Xcode 26.5
        run: |
          sudo xcode-select -s /Applications/Xcode_26.5.app
          xcodebuild -version

      - name: Verify toolchain
        run: |
          echo "Ruby: $(ruby -v)"
          which bundle || gem install bundler

      - name: Install gems
        run: bundle install

      - name: Deploy to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_B64: ${{ secrets.APP_STORE_CONNECT_API_KEY_B64 }}
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          IOS_CERTIFICATE_P12: ${{ secrets.IOS_CERTIFICATE_P12 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
          APP_IDENTIFIER: ${{ secrets.APP_IDENTIFIER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          ITC_TEAM_ID: ${{ secrets.ITC_TEAM_ID }}
          XCODE_PROJECT: ${{ secrets.XCODE_PROJECT }}
          XCODE_SCHEME: ${{ secrets.XCODE_SCHEME }}
          BUILD_NUMBER: ${{ github.event.inputs.build_number }}
        run: bundle exec fastlane beta --verbose

      # Runs even on failure — this is usually the difference between "guess
      # what went wrong" and "read the actual xcodebuild error."
      - name: Upload build artifacts and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ipa-and-logs-${{ github.run_id }}
          path: |
            build/*.ipa
            ~/Library/Logs/gym/*.log
          retention-days: 14
          if-no-files-found: ignore

      # Harmless no-op on a GitHub-hosted (ephemeral, wiped-after-run) runner —
      # keep it in so this workflow stays drop-in compatible if you later move
      # this job to your self-hosted Mac, where cleanup actually matters.
      - name: Cleanup workspace secrets
        if: always()
        run: |
          rm -f /tmp/AuthKey_*.p8 /tmp/dist_cert_*.p12 /tmp/profile_*.mobileprovision
          find ~/Library/Keychains -maxdepth 1 -name "ci_build_*.keychain-db" -mmin +60 -delete 2>/dev/null || true