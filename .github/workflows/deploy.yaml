name: Deploy to TestFlight

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: macos-latest

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Set up Ruby and Bundler
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundle-cache: true

      - name: Install System Dependencies
        run: |
          gem install fastlane --no-document

      - name: Execute Fastlane Automation
        env:
          # App Store Connect API Key Options
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_B64: ${{ secrets.APP_STORE_CONNECT_API_KEY_B64 }}

          # App Identification Variables
          APP_IDENTIFIER: ${{ secrets.APP_IDENTIFIER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          ITC_TEAM_ID: ${{ secrets.ITC_TEAM_ID }}

          # App Metadata Configuration 
          XCODE_PROJECT: ${{ secrets.XCODE_PROJECT }}   # Example: SampleApp (Do not include .xcodeproj extension)
          XCODE_SCHEME: ${{ secrets.XCODE_SCHEME }}     # Example: SampleApp

          # Code Signing File Assets
          IOS_CERTIFICATE_P12: ${{ secrets.IOS_CERTIFICATE_P12 }}             # Base64 encoded .p12 distribution file
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}   # Password protecting your .p12 certificate
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}   # Base64 encoded .mobileprovision profile
        run: |
          bundle exec fastlane beta --verbose